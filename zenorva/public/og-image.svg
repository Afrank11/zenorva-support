  <text x="72" y="440" font-family="system-ui, sans-serif" font-size="28" fill="white" opacity="0.6">Reduce support costs by 40–60%. Founder-led quality control.</text>

  <!-- Divider -->
  <line x1="72" y1="496" x2="1128" y2="496" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

